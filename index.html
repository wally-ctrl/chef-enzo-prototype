<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chef Enzo - Cooking Tutor</title>
    <script crossorigin src="https://unpkg.com/@daily-co/daily-js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a1a1a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            position: relative;
            width: 960px;
            height: 540px;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }

        /* Chef Enzo main view (Tavus video feed) */
        .chef-enzo-main {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1;
            overflow: hidden;
        }

        .chef-enzo-main iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .chef-enzo-main.thumbnail {
            width: 160px;
            height: 120px;
            bottom: 16px;
            left: 16px;
            top: auto;
            border-radius: 8px;
            border: 2px solid rgba(255,255,255,0.3);
            z-index: 10;
        }

        /* Loading state for Tavus */
        .chef-loading {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            color: white;
            z-index: 1;
            background: #000;
        }

        .chef-loading.hidden {
            display: none;
        }

        .chef-loading .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.2);
            border-top-color: #e53935;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .chef-loading p {
            font-size: 14px;
            opacity: 0.7;
        }

        /* WATCH button */
        .watch-btn {
            position: absolute;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 5;
            background: #e53935;
            color: white;
            border: none;
            padding: 12px 36px;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 2px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 20px rgba(229, 57, 53, 0.4);
        }

        .watch-btn:hover {
            background: #c62828;
            transform: translateX(-50%) scale(1.05);
            box-shadow: 0 6px 28px rgba(229, 57, 53, 0.6);
        }

        .watch-btn:active {
            transform: translateX(-50%) scale(0.98);
        }

        .watch-btn.hidden {
            opacity: 0;
            pointer-events: none;
            transform: translateX(-50%) translateY(20px);
        }

        .watch-btn svg {
            width: 18px;
            height: 18px;
            fill: white;
        }

        /* Video thumbnail (appears after clicking WATCH) */
        .video-thumbnail {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 200px;
            height: 150px;
            border-radius: 8px;
            overflow: hidden;
            z-index: 15;
            cursor: pointer;
            opacity: 0;
            transform: scale(0.8);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
            border: 3px solid rgba(255,255,255,0.5);
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }

        .video-thumbnail.visible {
            opacity: 1;
            transform: scale(1);
            pointer-events: auto;
        }

        .video-thumbnail:hover {
            transform: scale(1.05);
            border-color: rgba(255,255,255,0.8);
        }

        .video-thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .video-thumbnail .play-icon {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 40px;
            height: 40px;
            background: rgba(0,0,0,0.55);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .video-thumbnail .play-icon svg {
            width: 18px;
            height: 18px;
            fill: white;
            margin-left: 2px;
        }

        .video-thumbnail .thumb-label {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.8);
            color: white;
            font-size: 12px;
            font-weight: 700;
            padding: 6px 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Full-screen video player */
        .video-player {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 8;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
            background: #000;
        }

        .video-player.active {
            opacity: 1;
            pointer-events: auto;
        }

        .video-player iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Close button */
        .close-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 36px;
            height: 36px;
            background: rgba(0,0,0,0.7);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 20;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s ease;
        }

        .close-btn.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .close-btn:hover {
            background: rgba(229, 57, 53, 0.9);
            transform: scale(1.1);
        }

        /* Playing indicator */
        .playing-indicator {
            position: absolute;
            top: 16px;
            left: 16px;
            display: flex;
            align-items: center;
            gap: 6px;
            z-index: 12;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .playing-indicator.visible {
            opacity: 1;
        }

        .playing-indicator .bar-container {
            display: flex;
            gap: 2px;
            align-items: flex-end;
            height: 16px;
        }

        .playing-indicator .bar {
            width: 3px;
            background: #e53935;
            border-radius: 1px;
            animation: equalizer 0.8s ease-in-out infinite alternate;
        }

        .playing-indicator .bar:nth-child(1) { height: 8px; animation-delay: 0s; }
        .playing-indicator .bar:nth-child(2) { height: 14px; animation-delay: 0.2s; }
        .playing-indicator .bar:nth-child(3) { height: 6px; animation-delay: 0.4s; }
        .playing-indicator .bar:nth-child(4) { height: 12px; animation-delay: 0.1s; }

        .playing-indicator .text {
            color: white;
            font-size: 12px;
            font-weight: 600;
            text-shadow: 0 1px 4px rgba(0,0,0,0.5);
        }

        @keyframes equalizer {
            0% { height: 4px; }
            100% { height: 16px; }
        }

        /* Webcam PiP overlay (bottom-right, on top of Enzo) */
        .webcam-pip {
            position: absolute;
            bottom: 16px;
            right: 16px;
            width: 160px;
            height: 120px;
            border-radius: 8px;
            overflow: hidden;
            border: 2px solid rgba(255,255,255,0.3);
            z-index: 6;
            background: #111;
            box-shadow: 0 4px 16px rgba(0,0,0,0.5);
        }

        .webcam-pip video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        .webcam-pip .pip-label {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.6);
            color: white;
            font-size: 11px;
            padding: 3px 6px;
            text-align: center;
        }

        /* Quit button */
        .quit-btn {
            position: absolute;
            top: 12px;
            left: 12px;
            z-index: 5;
            background: rgba(0,0,0,0.6);
            color: white;
            border: none;
            padding: 8px 18px;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 1px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .quit-btn:hover {
            background: rgba(229, 57, 53, 0.9);
        }

        /* Reset button */
        .reset-btn {
            position: absolute;
            bottom: 24px;
            right: 24px;
            z-index: 5;
            background: rgba(255,255,255,0.15);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
            padding: 8px 20px;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 1px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .reset-btn:hover {
            background: rgba(255,255,255,0.25);
            border-color: rgba(255,255,255,0.5);
        }

        /* Error message */
        .error-msg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #e53935;
            font-size: 14px;
            text-align: center;
            z-index: 5;
            display: none;
        }

        .error-msg.visible {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container" id="app">
        <!-- Chef Enzo live video feed (Tavus) -->
        <div class="chef-enzo-main" id="chefEnzo"></div>

        <!-- Loading spinner while Tavus conversation is created -->
        <div class="chef-loading" id="chefLoading">
            <div class="spinner"></div>
            <p>Connecting to Chef Enzo...</p>
        </div>

        <!-- Error message -->
        <div class="error-msg" id="errorMsg"></div>

        <!-- WATCH button -->
        <button class="watch-btn" id="watchBtn" onclick="showVideoThumbnail()">
            <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
            WATCH
        </button>

        <!-- Video thumbnail (small preview using YouTube thumbnail) -->
        <div class="video-thumbnail" id="videoThumb" onclick="expandVideo()">
            <img src="https://img.youtube.com/vi/tm3GIRhT1To/hqdefault.jpg" alt="How to Slice Garlic">
            <div class="play-icon">
                <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
            </div>
            <div class="thumb-label">How to Slice Garlic</div>
        </div>

        <!-- Full-screen video player (YouTube embed) -->
        <div class="video-player" id="videoPlayer"></div>

        <!-- Playing indicator -->
        <div class="playing-indicator" id="playingIndicator">
            <div class="bar-container">
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
            </div>
            <span class="text">Now Playing</span>
        </div>

        <!-- Close button -->
        <button class="close-btn" id="closeBtn" onclick="closeVideo()">✕</button>

        <!-- Webcam PiP -->
        <div class="webcam-pip" id="webcamPip">
            <video id="webcamVideo" autoplay muted playsinline></video>
            <div class="pip-label">You</div>
        </div>

        <!-- Quit button -->
        <button class="quit-btn" id="quitBtn" onclick="quitConversation()">QUIT</button>

        <!-- Reset button -->
        <button class="reset-btn" onclick="resetConversation()">RESET</button>
    </div>

    <script>
        const TAVUS_API_KEY = '046b41ea581e406aa16809fffcf5ff53';
        const TAVUS_PERSONA_ID = 'pfc09d283c95';

        // Start webcam and Tavus conversation on page load
        window.addEventListener('DOMContentLoaded', () => {
            startWebcam();
            createTavusConversation();
        });

        async function startWebcam() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
                document.getElementById('webcamVideo').srcObject = stream;
            } catch (err) {
                console.log('Webcam not available:', err);
                document.getElementById('webcamPip').style.display = 'none';
            }
        }

        async function createTavusConversation() {
            const loading = document.getElementById('chefLoading');
            const errorMsg = document.getElementById('errorMsg');
            loading.classList.remove('hidden');
            errorMsg.classList.remove('visible');

            try {
                const response = await fetch('https://tavusapi.com/v2/conversations', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-api-key': TAVUS_API_KEY
                    },
                    body: JSON.stringify({
                        persona_id: TAVUS_PERSONA_ID
                    })
                });

                if (!response.ok) {
                    const errData = await response.json().catch(() => ({}));
                    throw new Error(errData.message || `API error: ${response.status}`);
                }

                const data = await response.json();
                const conversationUrl = data.conversation_url;

                if (!conversationUrl) {
                    throw new Error('No conversation URL returned');
                }

                // Embed via Daily JS SDK with self-view hidden
                const chefEnzo = document.getElementById('chefEnzo');
                chefEnzo.innerHTML = '';
                window.dailyCall = window.Daily.createFrame(chefEnzo, {
                    showLeaveButton: false,
                    showLocalVideo: false,
                    showFullscreenButton: false,
                    iframeStyle: {
                        width: '100%',
                        height: '100%',
                        border: 'none',
                    },
                });
                // Listen for utterance events to detect trigger words
                window.dailyCall.on('app-message', (event) => {
                    const data = event.data;
                    console.log('app-message:', data);

                    // Check for utterance events (from user or replica)
                    if (data && data.event_type === 'conversation.utterance') {
                        const text = (data.properties && data.properties.text) || '';
                        if (text.toLowerCase().includes('garlic')) {
                            console.log('🧄 "Garlic" detected! Showing video thumbnail.');
                            // Hide WATCH button and show the video thumbnail
                            document.getElementById('watchBtn').classList.add('hidden');
                            document.getElementById('videoThumb').classList.add('visible');
                        }
                    }
                });

                window.dailyCall.join({ url: conversationUrl });

                loading.classList.add('hidden');

            } catch (err) {
                console.error('Tavus error:', err);
                loading.classList.add('hidden');
                errorMsg.textContent = 'Could not connect to Chef Enzo: ' + err.message;
                errorMsg.classList.add('visible');
            }
        }

        function showVideoThumbnail() {
            document.getElementById('watchBtn').classList.add('hidden');
            document.getElementById('videoThumb').classList.add('visible');
        }

        function expandVideo() {
            document.getElementById('videoThumb').classList.remove('visible');

            const player = document.getElementById('videoPlayer');
            player.innerHTML = '<iframe src="https://www.youtube.com/embed/tm3GIRhT1To?autoplay=1&rel=0&modestbranding=1" allow="autoplay; encrypted-media" allowfullscreen></iframe>';
            player.classList.add('active');

            // Shrink Tavus feed to thumbnail on the left
            document.getElementById('chefEnzo').classList.add('thumbnail');

            document.getElementById('closeBtn').classList.add('visible');
            document.getElementById('playingIndicator').classList.add('visible');
        }

        function closeVideo() {
            const player = document.getElementById('videoPlayer');
            player.innerHTML = '';
            player.classList.remove('active');

            // Expand Tavus feed back to full screen
            document.getElementById('chefEnzo').classList.remove('thumbnail');

            document.getElementById('closeBtn').classList.remove('visible');
            document.getElementById('playingIndicator').classList.remove('visible');
            document.getElementById('videoThumb').classList.remove('visible');

            document.getElementById('watchBtn').classList.remove('hidden');
        }

        function quitConversation() {
            // End the Daily call
            if (window.dailyCall) {
                window.dailyCall.destroy();
                window.dailyCall = null;
            }

            // Stop webcam
            const video = document.getElementById('webcamVideo');
            if (video.srcObject) {
                video.srcObject.getTracks().forEach(t => t.stop());
                video.srcObject = null;
            }

            // Clear Enzo feed, show goodbye
            document.getElementById('chefEnzo').innerHTML = '';
            document.getElementById('webcamPip').style.display = 'none';
            document.getElementById('watchBtn').classList.add('hidden');
            document.getElementById('quitBtn').style.display = 'none';
            document.getElementById('chefLoading').classList.remove('hidden');
            document.querySelector('#chefLoading .spinner').style.display = 'none';
            document.querySelector('#chefLoading p').textContent = 'Session ended. Thanks for cooking with Chef Enzo!';
        }

        function resetConversation() {
            // Close any playing video first
            closeVideo();

            // Destroy the existing Daily call
            if (window.dailyCall) {
                window.dailyCall.destroy();
                window.dailyCall = null;
            }

            // Clear and reset
            document.getElementById('chefEnzo').innerHTML = '';
            document.getElementById('chefEnzo').classList.remove('thumbnail');

            // Create a fresh conversation
            createTavusConversation();
        }
    </script>
</body>
</html>
