<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chef Enzo - Cooking Tutor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a1a1a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            position: relative;
            width: 960px;
            height: 540px;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }

        /* Chef Enzo main view */
        .chef-enzo-main {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1;
            overflow: hidden;
        }

        .chef-enzo-main img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .chef-enzo-main.thumbnail {
            width: 160px;
            height: 120px;
            bottom: 16px;
            left: 16px;
            top: auto;
            border-radius: 8px;
            border: 2px solid rgba(255,255,255,0.3);
            z-index: 10;
        }

        /* Chef Enzo overlay gradient */
        .chef-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 200px;
            background: linear-gradient(transparent, rgba(0,0,0,0.7));
            pointer-events: none;
            transition: opacity 0.5s ease;
            z-index: 2;
        }

        .chef-overlay.hidden {
            opacity: 0;
        }

        /* Chef info */
        .chef-info {
            position: absolute;
            bottom: 80px;
            left: 40px;
            z-index: 3;
            color: white;
            transition: all 0.5s ease;
        }

        .chef-info.hidden {
            opacity: 0;
            transform: translateY(20px);
            pointer-events: none;
        }

        .chef-info h1 {
            font-size: 36px;
            font-weight: 700;
            text-shadow: 0 2px 8px rgba(0,0,0,0.5);
        }

        .chef-info p {
            font-size: 16px;
            opacity: 0.85;
            margin-top: 4px;
            text-shadow: 0 1px 4px rgba(0,0,0,0.5);
        }

        /* Student thumbnail (bottom right) — hidden by default, shown during video */
        .student-thumbnail {
            position: absolute;
            bottom: 16px;
            right: 16px;
            width: 160px;
            height: 120px;
            border-radius: 8px;
            overflow: hidden;
            border: 2px solid rgba(255,255,255,0.3);
            z-index: 10;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        .student-thumbnail.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .student-thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .student-thumbnail .label {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.6);
            color: white;
            font-size: 11px;
            padding: 3px 6px;
            text-align: center;
        }

        /* WATCH button */
        .watch-btn {
            position: absolute;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 5;
            background: #e53935;
            color: white;
            border: none;
            padding: 12px 36px;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 2px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 20px rgba(229, 57, 53, 0.4);
        }

        .watch-btn:hover {
            background: #c62828;
            transform: translateX(-50%) scale(1.05);
            box-shadow: 0 6px 28px rgba(229, 57, 53, 0.6);
        }

        .watch-btn:active {
            transform: translateX(-50%) scale(0.98);
        }

        .watch-btn.hidden {
            opacity: 0;
            pointer-events: none;
            transform: translateX(-50%) translateY(20px);
        }

        .watch-btn svg {
            width: 18px;
            height: 18px;
            fill: white;
        }

        /* Video thumbnail (appears after clicking WATCH) */
        .video-thumbnail {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 200px;
            height: 150px;
            border-radius: 8px;
            overflow: hidden;
            z-index: 15;
            cursor: pointer;
            opacity: 0;
            transform: scale(0.8);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
            border: 3px solid rgba(255,255,255,0.5);
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }

        .video-thumbnail.visible {
            opacity: 1;
            transform: scale(1);
            pointer-events: auto;
        }

        .video-thumbnail:hover {
            transform: scale(1.05);
            border-color: rgba(255,255,255,0.8);
        }

        .video-thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .video-thumbnail .play-icon {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 40px;
            height: 40px;
            background: rgba(0,0,0,0.55);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .video-thumbnail .play-icon svg {
            width: 18px;
            height: 18px;
            fill: white;
            margin-left: 2px;
        }

        .video-thumbnail .thumb-label {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.8);
            color: white;
            font-size: 12px;
            font-weight: 700;
            padding: 6px 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Full-screen video player */
        .video-player {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 8;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
            background: #000;
        }

        .video-player.active {
            opacity: 1;
            pointer-events: auto;
        }

        .video-player iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Close button */
        .close-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 36px;
            height: 36px;
            background: rgba(0,0,0,0.7);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 20;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s ease;
        }

        .close-btn.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .close-btn:hover {
            background: rgba(229, 57, 53, 0.9);
            transform: scale(1.1);
        }

        /* Status indicator */
        .status-dot {
            position: absolute;
            top: 16px;
            left: 16px;
            display: flex;
            align-items: center;
            gap: 6px;
            z-index: 5;
            transition: opacity 0.3s ease;
        }

        .status-dot.hidden {
            opacity: 0;
        }

        .status-dot .dot {
            width: 8px;
            height: 8px;
            background: #4caf50;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        .status-dot .label {
            color: white;
            font-size: 12px;
            font-weight: 600;
            text-shadow: 0 1px 4px rgba(0,0,0,0.5);
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Playing indicator */
        .playing-indicator {
            position: absolute;
            top: 16px;
            left: 16px;
            display: flex;
            align-items: center;
            gap: 6px;
            z-index: 12;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .playing-indicator.visible {
            opacity: 1;
        }

        .playing-indicator .bar-container {
            display: flex;
            gap: 2px;
            align-items: flex-end;
            height: 16px;
        }

        .playing-indicator .bar {
            width: 3px;
            background: #e53935;
            border-radius: 1px;
            animation: equalizer 0.8s ease-in-out infinite alternate;
        }

        .playing-indicator .bar:nth-child(1) { height: 8px; animation-delay: 0s; }
        .playing-indicator .bar:nth-child(2) { height: 14px; animation-delay: 0.2s; }
        .playing-indicator .bar:nth-child(3) { height: 6px; animation-delay: 0.4s; }
        .playing-indicator .bar:nth-child(4) { height: 12px; animation-delay: 0.1s; }

        .playing-indicator .text {
            color: white;
            font-size: 12px;
            font-weight: 600;
            text-shadow: 0 1px 4px rgba(0,0,0,0.5);
        }

        @keyframes equalizer {
            0% { height: 4px; }
            100% { height: 16px; }
        }

        /* Image setup overlay — only Chef Enzo upload needed */
        .setup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 30px;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .setup-overlay.hidden {
            display: none;
        }

        .setup-overlay h2 {
            font-size: 24px;
            font-weight: 600;
        }

        .setup-overlay p {
            font-size: 14px;
            opacity: 0.7;
            margin-top: -20px;
        }

        .drop-zone {
            width: 280px;
            height: 200px;
            border: 2px dashed rgba(255,255,255,0.3);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .drop-zone:hover {
            border-color: rgba(255,255,255,0.6);
            background: rgba(255,255,255,0.05);
        }

        .drop-zone.has-image {
            border-style: solid;
            border-color: #4caf50;
        }

        .drop-zone img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .drop-zone .drop-label {
            font-size: 14px;
            font-weight: 600;
            text-align: center;
            z-index: 1;
        }

        .drop-zone .drop-sublabel {
            font-size: 12px;
            opacity: 0.5;
            z-index: 1;
        }

        .drop-zone.has-image .drop-label,
        .drop-zone.has-image .drop-sublabel {
            display: none;
        }

        .drop-zone input[type="file"] {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        .start-btn {
            background: #e53935;
            color: white;
            border: none;
            padding: 14px 48px;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 1px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            opacity: 0.4;
            pointer-events: none;
        }

        .start-btn.ready {
            opacity: 1;
            pointer-events: auto;
        }

        .start-btn.ready:hover {
            background: #c62828;
            transform: scale(1.05);
        }

        .drop-zone .check {
            position: absolute;
            top: 6px;
            right: 6px;
            width: 24px;
            height: 24px;
            background: #4caf50;
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            z-index: 2;
        }

        .drop-zone.has-image .check {
            display: flex;
        }
    </style>
</head>
<body>
    <!-- Setup overlay — only need Chef Enzo image -->
    <div class="setup-overlay" id="setupOverlay">
        <h2>Chef Enzo Prototype</h2>
        <p>Select your images to begin</p>
        <div style="display:flex;gap:24px;">
            <div class="drop-zone" id="dropChef">
                <span class="drop-label">Chef Enzo</span>
                <span class="drop-sublabel">Click to select</span>
                <input type="file" accept="image/*" onchange="loadImage(event, 'chef')">
                <div class="check">✓</div>
            </div>
            <div class="drop-zone" id="dropStudent">
                <span class="drop-label">Student (You)</span>
                <span class="drop-sublabel">Click to select</span>
                <input type="file" accept="image/*" onchange="loadImage(event, 'student')">
                <div class="check">✓</div>
            </div>
        </div>
        <button class="start-btn" id="startBtn" onclick="startPrototype()">START PROTOTYPE</button>
    </div>

    <div class="container" id="app">
        <!-- Chef Enzo main image -->
        <div class="chef-enzo-main" id="chefEnzo">
            <img id="chefImg" src="" alt="Chef Enzo">
        </div>

        <!-- Gradient overlay for chef view -->
        <div class="chef-overlay" id="chefOverlay"></div>

        <!-- Status indicator -->
        <div class="status-dot" id="statusDot">
            <div class="dot"></div>
            <span class="label">LIVE</span>
        </div>

        <!-- Chef info -->
        <div class="chef-info" id="chefInfo">
            <h1>Chef Enzo</h1>
            <p>Your Personal Cooking Tutor</p>
        </div>

        <!-- WATCH button -->
        <button class="watch-btn" id="watchBtn" onclick="showVideoThumbnail()">
            <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
            WATCH
        </button>

        <!-- Video thumbnail (small preview using YouTube thumbnail) -->
        <div class="video-thumbnail" id="videoThumb" onclick="expandVideo()">
            <img src="https://img.youtube.com/vi/tm3GIRhT1To/hqdefault.jpg" alt="How to Slice Garlic">
            <div class="play-icon">
                <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
            </div>
            <div class="thumb-label">How to Slice Garlic</div>
        </div>

        <!-- Full-screen video player (YouTube embed) -->
        <div class="video-player" id="videoPlayer">
            <!-- iframe injected dynamically -->
        </div>

        <!-- Playing indicator -->
        <div class="playing-indicator" id="playingIndicator">
            <div class="bar-container">
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
            </div>
            <span class="text">Now Playing</span>
        </div>

        <!-- Close button -->
        <button class="close-btn" id="closeBtn" onclick="closeVideo()">✕</button>

        <!-- Student thumbnail (bottom right) -->
        <div class="student-thumbnail" id="studentThumb">
            <img id="studentImg" src="" alt="You">
            <div class="label">You</div>
        </div>
    </div>

    <script>
        const images = { chef: null, student: null };

        function loadImage(event, type) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                images[type] = e.target.result;

                const dropZone = document.getElementById(type === 'chef' ? 'dropChef' : 'dropStudent');
                const existingImg = dropZone.querySelector('img');
                if (existingImg) existingImg.remove();

                const img = document.createElement('img');
                img.src = e.target.result;
                dropZone.appendChild(img);
                dropZone.classList.add('has-image');

                if (images.chef && images.student) {
                    document.getElementById('startBtn').classList.add('ready');
                }
            };
            reader.readAsDataURL(file);
        }

        function startPrototype() {
            if (!images.chef || !images.student) return;
            document.getElementById('chefImg').src = images.chef;
            document.getElementById('studentImg').src = images.student;
            document.getElementById('setupOverlay').classList.add('hidden');
        }

        function showVideoThumbnail() {
            document.getElementById('watchBtn').classList.add('hidden');
            document.getElementById('videoThumb').classList.add('visible');
        }

        function expandVideo() {
            // Hide thumbnail
            document.getElementById('videoThumb').classList.remove('visible');

            // Inject YouTube iframe with autoplay
            const player = document.getElementById('videoPlayer');
            player.innerHTML = '<iframe src="https://www.youtube.com/embed/tm3GIRhT1To?autoplay=1&rel=0&modestbranding=1" allow="autoplay; encrypted-media" allowfullscreen></iframe>';
            player.classList.add('active');

            // Shrink Chef Enzo to thumbnail (left side)
            document.getElementById('chefEnzo').classList.add('thumbnail');

            // Hide chef overlay and info
            document.getElementById('chefOverlay').classList.add('hidden');
            document.getElementById('chefInfo').classList.add('hidden');
            document.getElementById('statusDot').classList.add('hidden');

            // Show close button, playing indicator, and student
            document.getElementById('closeBtn').classList.add('visible');
            document.getElementById('playingIndicator').classList.add('visible');
            document.getElementById('studentThumb').classList.add('visible');
        }

        function closeVideo() {
            // Remove iframe to stop playback
            const player = document.getElementById('videoPlayer');
            player.innerHTML = '';
            player.classList.remove('active');

            // Expand Chef Enzo back to full
            document.getElementById('chefEnzo').classList.remove('thumbnail');

            // Show chef overlay and info
            document.getElementById('chefOverlay').classList.remove('hidden');
            document.getElementById('chefInfo').classList.remove('hidden');
            document.getElementById('statusDot').classList.remove('hidden');

            // Hide controls and student
            document.getElementById('closeBtn').classList.remove('visible');
            document.getElementById('playingIndicator').classList.remove('visible');
            document.getElementById('videoThumb').classList.remove('visible');
            document.getElementById('studentThumb').classList.remove('visible');

            // Show watch button again
            document.getElementById('watchBtn').classList.remove('hidden');
        }
    </script>
</body>
</html>
